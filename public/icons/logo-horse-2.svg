  <path d="M270 130 L280 95 L300 108" stroke="#818cf8" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M240 128 L245 90 L268 100" stroke="#818cf8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 耳朵 -->
  <path d="M200 140 L185 105 L210 125" fill="#7c3aed" opacity="0.7"/>
  <path d="M220 132 L215 98 L235 118" fill="#7c3aed" opacity="0.7"/>

  <!-- Terminal prompt >_ 底部 -->
  <path d="M190 430 L215 445 L190 460" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="228" y1="445" x2="270" y2="445" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>
