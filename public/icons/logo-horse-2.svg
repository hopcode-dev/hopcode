      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- 马头侧面 — 几何棱角风格 -->
  <path d="
    M200 140
    L175 160
    L155 220
    L145 280
    L155 310
    L175 340
    L200 360
    L240 375
    L280 370
    L310 350
    L325 320
    L330 280
    L325 240
    L340 220
    L350 190
    L340 165
    L320 150
    L295 135
    L270 130
    L240 128
