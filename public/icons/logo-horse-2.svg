  <path d="M155 220 L220 230 L280 210 L325 240" stroke="#0f172a" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <path d="M175 340 L240 310 L310 350" stroke="#0f172a" stroke-width="2" fill="none"/>

